<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 52 - 90-Day Security Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg-darker: #050809; --bg-panel: rgba(16,21,23,0.75); --border-color: rgba(28,36,38,0.65);
            --color-cyan: #00d9ff; --color-green: #00ff88; --color-amber: #ffb347; --color-red: #ff5555;
            --text-primary: #e6edf0; --text-muted: #7d898c; --font-mono: 'IBM Plex Mono', monospace; --font-sans: 'Inter', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #050809 0%, #0a0e0f 100%);
            min-height: 100vh; color: var(--text-primary); font-family: var(--font-sans); padding: 30px 20px;
        }
        .terminal-frame {
            max-width: 800px; margin: 0 auto; background: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.4); backdrop-filter: blur(12px);
        }
        .term-header {
            background: var(--bg-darker); border-bottom: 1px solid var(--border-color); padding: 8px 14px;
            display: flex; align-items: center; justify-content: space-between; font-family: var(--font-mono); font-size: 0.75rem;
        }
        .term-dots { display: flex; gap: 6px; }
        .term-dots span { width: 10px; height: 10px; border-radius: 50%; }
        .term-dots .r { background: #ff5f56; } .term-dots .y { background: #ffbd2e; } .term-dots .g { background: #27c93f; }
        .term-title { color: var(--text-muted); }
        .term-badge {
            background: rgba(255,179,71,0.1); border: 1px solid rgba(255,179,71,0.3); color: var(--color-amber);
            padding: 2px 8px; border-radius: 3px; font-size: 0.68rem;
        }
        .term-body { padding: 24px; font-family: var(--font-mono); font-size: 0.88rem; line-height: 1.6; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--color-cyan); text-decoration: none; font-size: 0.85rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link"><i data-lucide="arrow-left"></i> Back to Portfolio</a>
    <div class="terminal-frame">
        <div class="term-header">
            <div class="term-dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
            <div class="term-title">kali@portfolio:~</div>
            <span class="term-badge">CLASSIFIED</span>
        </div>
        <div class="term-body">
            <h1 style="color: var(--color-cyan); font-size: 1.5rem; margin-bottom: 16px;">DAY 52: ENCRYPTION REQUIRED</h1>
            <p>Intelligence not yet extracted. Daily logs will be published as challenge progresses.</p>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
