<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 82 - Cybersecurity Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="style.css?v=3">
    <style>
        :root {
            --bg-darker: #050809;
            --bg-panel: rgba(16, 21, 23, 0.65);
            --border-color: rgba(28, 36, 38, 0.65);
            --color-cyan: #00d9ff;
            --color-green: #00ff88;
            --color-amber: #ffb347;
            --color-red: #ff5555;
            --color-green-dim: rgba(0, 255, 136, 0.15);
            --text-primary: #e6edf0;
            --text-muted: #7d898c;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #050809 0%, #0a0e0f 100%);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        .day-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--color-cyan);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .day-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        .day-title {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            color: var(--color-cyan);
            margin: 0;
        }
        .day-meta {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .day-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        .day-section {
            margin-bottom: 20px;
        }
        .day-section-title {
            color: var(--color-amber);
            font-family: var(--font-mono);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .day-section-content {
            color: var(--text-primary);
            line-height: 1.6;
        }
        .incident-alert {
            background: rgba(255, 85, 85, 0.05);
            border-left: 3px solid var(--color-red);
            padding: 12px 16px;
            margin-top: 8px;
            border-radius: 0 4px 4px 0;
        }
        .incident-title {
            color: var(--color-red);
            font-weight: bold;
            margin-bottom: 4px;
        }
        .verify-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--color-green-dim);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: var(--color-green);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            margin-top: 16px;
        }
        .upcoming-badge {
            background: rgba(255, 179, 71, 0.1);
            border-color: rgba(255, 179, 71, 0.3);
            color: var(--color-amber);
        }
    </style>
</head>
<body>
    <div class="day-container">
        <a href="index.html" class="back-link"><i data-lucide="arrow-left"></i> Back to Portfolio</a>
        
        <div class="day-header">
            <h1 class="day-title">Day 82: Classified Topic</h1>
            <div class="day-meta">
                <span>Challenge #82</span>
                <span>Status: upcoming</span>
            </div>
        </div>
        
        <div class="day-card">
            <div class="day-section">
                <div class="day-section-title"><i data-lucide="target"></i> SUBJECT MATTER</div>
                <p class="day-section-content">Hidden until active</p>
            </div>
            
            <div class="day-section">
                <div class="day-section-title"><i data-lucide="file-text"></i> KEY TAKEAWAY</div>
                <p class="day-section-content">Data encrypted</p>
            </div>
            
            <div class="day-section">
                <div class="day-section-title"><i data-lucide="shield-alert"></i> INCIDENT CORRELATION</div>
                <div class="incident-alert">
                    <div class="incident-title">Redacted</div>
                    <p class="day-section-content">Intelligence not yet available</p>
                </div>
            </div>
            
            <div class="verify-badge upcoming-badge"><i data-lucide="lock"></i> Classified Checkpoint</div>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
